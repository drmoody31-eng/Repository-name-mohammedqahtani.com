<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة | Dr. Mohammed AlQahtani</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C9A96E;
            --bg: #FAFAF7;
            --text: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        a {
            display: inline-block;
            padding: 12px 40px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>٤٠٤</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة<br>Sorry, the page you're looking for doesn't exist</p>
        <a href="/">العودة للرئيسية — Back Home</a>
    </div>
</body>
</html>
